name: Check Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies with retry
        run: |
          for i in {1..3}; do
            npm ci --prefer-offline --no-audit --progress=false && break
            echo "npm ci failed, retrying in 30 seconds..."
            sleep 30
          done

      - name: Check for vulnerabilities
        run: npm audit --audit-level=moderate
        # This will return non-zero exit code if vulnerabilities are found at moderate level or higher
        # Thus will fail the workflow and block the merge before building

      - run: npm run build
