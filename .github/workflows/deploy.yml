name: Landing - Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: clinicfaceconcept-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.VPS_HOST }} << 'EOF'
            set -euo pipefail

            APP_DIR="/var/www/clinicfaceconcept"
            APP_NAME="clinicfaceconcept"
            APP_PORT="3002"

            cd "$APP_DIR"

            echo ">>> Pulling latest code..."
            git fetch --all
            git reset --hard origin/main

            echo ">>> Installing dependencies..."
            npm ci

            echo ">>> Building application..."
            NODE_OPTIONS='--max-old-space-size=4096' npm run build

            echo ">>> Restarting PM2 app ($APP_NAME)..."
            if pm2 describe "$APP_NAME" >/dev/null 2>&1; then
              pm2 restart "$APP_NAME" --update-env
            else
              # Start Next directly (recommended)
              pm2 start "node_modules/next/dist/bin/next" \
                --name "$APP_NAME" \
                --cwd "$APP_DIR" \
                -- start -p "$APP_PORT"
            fi

            pm2 save

            echo ">>> Reloading Caddy..."
            systemctl reload caddy

            echo ">>> Deploy complete."
          EOF

      - name: Summary
        run: |
          echo "### 🚀 Frontend Production Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Completed" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`$(git rev-parse --short HEAD)\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date -Iseconds)" >> $GITHUB_STEP_SUMMARY